# Thresholds are expressed as fractions of pass rate (0.0–1.0).
# A delta of 0.05 means a 5 percentage-point drop triggers a warning.
warning_threshold: 0.05
critical_threshold: 0.15

# How many past runs to include when computing drift baseline.
drift_window_runs: 5

# Max concurrent LLM calls (classifier + judge combined).
concurrency_limit: 5

# Models — override with env vars CLASSIFIER_MODEL / JUDGE_MODEL.
classifier_model: openai/gpt-4o-mini
judge_model: openai/gpt-4o
